<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPure AI | Ultra HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass max-w-xl w-full p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">PixelPure AI</h1>
        <p class="text-gray-400 mb-8 text-sm">Convert your blurry photos to 4K Ultra HD in seconds.</p>

        <div class="relative group cursor-pointer border-2 border-dashed border-gray-600 rounded-2xl p-10 hover:border-blue-500 transition-all mb-6">
            <input type="file" id="fileInp" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
            <div id="previewText">
                <svg class="w-12 h-12 mx-auto text-gray-500 group-hover:text-blue-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-gray-400">Click or Drag Image Here</p>
            </div>
            <img id="imgPreview" class="hidden max-h-64 mx-auto rounded-lg shadow-lg">
        </div>

        <button id="upBtn" onclick="processImage()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-95">
            Enhance to HD
        </button>

        <div id="loading" class="hidden mt-6">
            <div class="loader w-10 h-10 border-4 border-gray-700 rounded-full mx-auto mb-2"></div>
            <p class="text-blue-400 animate-pulse">AI is magicaly enhancing...</p>
        </div>

        <div id="result" class="mt-8 hidden">
            <p class="text-green-400 font-semibold mb-3">✨ Success! Your image is ready</p>
            <img id="finalImg" class="rounded-xl shadow-2xl border border-gray-700 mb-4">
            <a id="dlLink" href="#" target="_blank" class="block bg-gray-700 hover:bg-gray-600 py-3 rounded-lg">Download Result</a>
        </div>
    </div>

    <script>
        const fileInp = document.getElementById('fileInp');
        const imgPreview = document.getElementById('imgPreview');
        const previewText = document.getElementById('previewText');

        fileInp.onchange = e => {
            const [file] = fileInp.files;
            if (file) {
                imgPreview.src = URL.createObjectURL(file);
                imgPreview.classList.remove('hidden');
                previewText.classList.add('hidden');
            }
        };

        async function processImage() {
            if (!fileInp.files[0]) return alert("Please select an image!");

            const btn = document.getElementById('upBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            btn.classList.add('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(fileInp.files[0]);
            reader.onload = async () => {
                try {
                    const response = await fetch('/api/upscale', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: reader.result }),
                    });

                    const data = await response.json();
                    
                    if (data.output) {
                        // Vercel backend handles polling or returns direct output if simple
                        document.getElementById('finalImg').src = data.output;
                        document.getElementById('dlLink').href = data.output;
                        result.classList.remove('hidden');
                    } else {
                        alert("Error: " + (data.error || "AI failed to process"));
                    }
                } catch (err) {
                    alert("Network error. Check Vercel Logs.");
                } finally {
                    btn.classList.remove('hidden');
                    loading.classList.add('hidden');
                }
            };
        }
    </script>
</body>
</html>
